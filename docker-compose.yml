x-api: &api
  build: .
  restart: unless-stopped
  ulimits:
    memlock: -1
    nofile:
      soft: 65535
      hard: 65535
  volumes:
    - sock:/run/sock
  networks:
    - fraud-net
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "168MB"

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777

services:
  lb:
    image: haproxy:alpine
    cpuset: "2,3"
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - fraud-net
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "14MB"

  api1:
    <<: *api
    cpuset: "0"
    environment:
      - SOCK=/run/sock/api1.sock

  api2:
    <<: *api
    cpuset: "1"
    environment:
      - SOCK=/run/sock/api2.sock

networks:
  fraud-net:
    driver: bridge
