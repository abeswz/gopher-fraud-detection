global
    maxconn 500
    tune.bufsize 4096
    log /dev/null local0
    nbthread 1

defaults
    mode tcp
    timeout connect 50ms
    timeout client 30s
    timeout server 30s

frontend ft
    bind *:9999
    default_backend api

backend api
    balance roundrobin
    server api1 unix@/run/sock/api1.sock
    server api2 unix@/run/sock/api2.sock
