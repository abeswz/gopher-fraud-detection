global
    maxconn 8192
    nbthread 1

defaults
    mode tcp
    no log
    option dontlognull
    timeout connect 50ms
    timeout client 30s
    timeout server 30s

frontend ft
    bind *:9999
    default_backend api

backend api
    balance roundrobin
    server api1 unix@/run/sock/api1.sock
    server api2 unix@/run/sock/api2.sock
