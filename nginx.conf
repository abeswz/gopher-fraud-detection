worker_processes 1;
worker_rlimit_nofile 65535;
error_log /dev/null;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

stream {
    upstream apis {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
    }

    server {
        listen 9999;
        proxy_pass apis;
        proxy_connect_timeout 50ms;
        proxy_timeout 30s;
    }
}
